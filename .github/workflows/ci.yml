name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.11", "3.12"]
        # macOS is shotlist's flagship native-capture platform, so cover it too
        # — but only on 3.12 to keep runner minutes down.
        include:
          - os: macos-14
            python-version: "3.12"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Install Playwright Chromium (Linux)
        if: runner.os == 'Linux'
        run: python -m playwright install --with-deps chromium

      - name: Install Playwright Chromium (macOS)
        if: runner.os == 'macOS'
        run: python -m playwright install chromium

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Type check (mypy)
        run: mypy src tests

      - name: Test (pytest + coverage)
        run: >-
          python -m pytest -q
          --cov=shotlist
          --cov-report=term-missing
          --cov-fail-under=85
