name: verify-action

# Exercises the bundled composite action on every PR in two complementary ways:
#   verify-release — smoke-tests the SHIPPED action + PyPI package (pinned tag),
#                    proving the released integration still works end to end.
#   verify-source  — runs the PR's own action.yml against the PR's source
#                    (`package: -e .`), so a regression in either the action or
#                    the CLI is caught before it ships.
# Both run on Linux, where the rendered CLI shots are deterministic.
on:
  pull_request:
  workflow_dispatch:

jobs:
  verify-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate screenshots (shotlist run)
        uses: varmabudharaju/shotlist@v0.3.3
        with:
          command: run
          config: .github/ci-demo/.shotlist.yaml

      - name: Drift check (shotlist check)
        uses: varmabudharaju/shotlist@v0.3.3
        with:
          command: check
          config: .github/ci-demo/.shotlist.yaml

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ci-demo-screenshots-${{ github.job }}
          path: .github/ci-demo/shots

  verify-source:
    runs-on: ubuntu-latest
    # Dogfood the action's opt-in sticky PR comment on this repo's own PRs. A
    # permissions block scopes the token down, so it must re-grant checkout's
    # `contents: read` alongside the `pull-requests: write` the comment needs.
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate screenshots (PR action + PR source)
        uses: ./
        with:
          command: run
          config: .github/ci-demo/.shotlist.yaml
          package: "-e ."

      - name: Drift check (PR action + PR source)
        uses: ./
        with:
          command: check
          config: .github/ci-demo/.shotlist.yaml
          package: "-e ."
          diff-dir: shotlist-diffs
          pr-comment: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ci-demo-screenshots-${{ github.job }}
          path: .github/ci-demo/shots
